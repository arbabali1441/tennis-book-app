<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f5a43" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tennis Lesson Booking</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Tennis Lesson Booking</h1>
      <p>Book private, semi-private, or group lessons for kids and adults.</p>
      <div class="hero-actions">
        <button type="button" id="install-app-btn" class="admin-link install-btn" hidden>Install App</button>
        <a class="admin-link" href="/login">Admin Login</a>
      </div>
    </header>

    <section class="card">
      <h2>Book a Lesson</h2>
      <form id="booking-form">
        <label>
          Student
          <select name="studentId" id="student-select" required>
            <option value="">Select student</option>
          </select>
        </label>

        <label>
          Lesson Type
          <select name="serviceId" id="service-select" required>
            <option value="">Select lesson type</option>
          </select>
        </label>

        <label>
          Available Slot
          <select name="slotId" id="slot-select" required>
            <option value="">Select a slot</option>
          </select>
        </label>

        <label>
          Notes (optional)
          <textarea name="notes" rows="3" placeholder="Lesson goals or requests"></textarea>
        </label>

        <button type="submit">Confirm Lesson</button>
      </form>
      <p id="form-message" class="message"></p>
    </section>

    <section class="card">
      <h2>Student Lesson Balance</h2>
      <div id="student-summary" class="summary-box">Select a student to view lesson and payment totals.</div>
    </section>
  </main>
  <footer class="site-footer">Copyright © 2026 Tennis Book App. Eng AA Tech.</footer>

  <script src="/pwa.js"></script>
  <script src="/app.js"></script>
</body>
</html>
