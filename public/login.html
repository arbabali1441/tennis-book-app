<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f5a43" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Admin Login</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Admin Login</h1>
      <p>Sign in with the admin password to manage slots and bookings.</p>
      <div class="hero-actions">
        <a class="admin-link" href="/">Back to Booking Page</a>
      </div>
    </header>

    <section class="card auth-card">
      <form id="login-form">
        <label>
          Password
          <input type="password" name="password" required />
        </label>

        <button type="submit">Login as Admin</button>
      </form>
      <p id="login-message" class="message"></p>
    </section>
  </main>
  <footer class="site-footer">Copyright © 2026 Tennis Book App. Arbab Ali Tech.</footer>

  <script src="/pwa.js"></script>
  <script src="/login.js"></script>
</body>
</html>
